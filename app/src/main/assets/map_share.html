<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #131313; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #131313; }
        .leaflet-control-attribution, .leaflet-control-zoom { display: none !important; }
        .leaflet-pane .leaflet-overlay-pane canvas { filter: drop-shadow(0 0 4px rgba(0,0,0,0.5)); }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([0,0], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        function drawPoints(pointsJson) {
            try {
                var points = JSON.parse(pointsJson);
                if (points.length < 2) return;
                var latlngs = points.map(p => [p.lat, p.lng]);
                L.polyline(latlngs, { color: '#54E98A', weight: 6, opacity: 0.9, lineCap: 'round' }).addTo(map);
                
                // Fix "smashed" look by ensuring size is correct before fitting
                setTimeout(function() {
                    map.invalidateSize();
                    map.fitBounds(L.latLngBounds(latlngs), { padding: [40, 40] });
                }, 300);
            } catch(e) {}
        }
    </script>
</body>
</html>
