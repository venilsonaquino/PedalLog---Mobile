<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>PedalLog Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #1a1a2e; }
        #map { height: 100vh; width: 100vw; }

        /* Hide default Leaflet controls */
        .leaflet-control-zoom { display: none !important; }

        /* === Floating Controls === */
        .map-controls {
            position: absolute;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* Zoom controls — right side, middle height */
        #zoom-controls {
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
        }

        /* Bottom-right controls */
        #bottom-controls {
            right: 12px;
            bottom: 20px;
            gap: 8px;
        }

        .ctrl-btn {
            width: 40px;
            height: 40px;
            background: rgba(20, 20, 35, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 300;
            transition: background 0.15s ease, transform 0.1s ease;
            user-select: none;
            -webkit-user-select: none;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .ctrl-btn:active { transform: scale(0.92); }
        .ctrl-btn:hover { background: rgba(40, 40, 60, 0.95); }

        /* Zoom top button — rounded top */
        #btn-zoom-in {
            border-radius: 10px 10px 0 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* Zoom bottom button — rounded bottom */
        #btn-zoom-out {
            border-radius: 0 0 10px 10px;
        }

        /* Separator line between zoom buttons */
        .zoom-divider {
            width: 40px;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }

        /* Layers button */
        #btn-layers {
            border-radius: 10px;
            width: 40px;
            height: 40px;
        }

        /* Focus / GPS button — emerald accent */
        #btn-focus {
            border-radius: 10px;
            width: 40px;
            height: 40px;
            background: rgba(16, 185, 129, 0.88);
            border-color: rgba(16, 185, 129, 0.4);
        }
        #btn-focus:hover { background: rgba(16, 185, 129, 1); }

        /* Layers dropdown panel */
        #layers-panel {
            position: absolute;
            right: 60px;
            bottom: 20px;
            z-index: 1001;
            background: rgba(20, 20, 35, 0.96);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 10px;
            display: none;
            flex-direction: column;
            gap: 6px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            min-width: 160px;
        }
        #layers-panel.open { display: flex; }

        .layer-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            border-radius: 8px;
            cursor: pointer;
            color: #e2e8f0;
            font-size: 13px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            transition: background 0.15s;
        }
        .layer-option:hover { background: rgba(255,255,255,0.08); }
        .layer-option.active { color: #10b981; }
        .layer-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* Loading overlay */
        #loading {
            position: absolute;
            inset: 0;
            background: #0f0f1a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(16,185,129,0.2);
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading"><div class="spinner"></div></div>
    <div id="map"></div>

    <!-- Zoom Controls (right, vertically centered) -->
    <div class="map-controls" id="zoom-controls">
        <button class="ctrl-btn" id="btn-zoom-in" onclick="map.zoomIn()">+</button>
        <div class="zoom-divider"></div>
        <button class="ctrl-btn" id="btn-zoom-out" onclick="map.zoomOut()">−</button>
    </div>

    <!-- Bottom-right Controls -->
    <div class="map-controls" id="bottom-controls">
        <button class="ctrl-btn" id="btn-layers" onclick="toggleLayers()" title="Camadas">
            <!-- Layers icon (stacked lines) -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 2 7 12 12 22 7 12 2"/>
                <polyline points="2 17 12 22 22 17"/>
                <polyline points="2 12 12 17 22 12"/>
            </svg>
        </button>
        <button class="ctrl-btn" id="btn-focus" onclick="focusRoute()" title="Focar na Rota">
            <!-- GPS crosshair icon -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <line x1="12" y1="2" x2="12" y2="6"/>
                <line x1="12" y1="18" x2="12" y2="22"/>
                <line x1="2" y1="12" x2="6" y2="12"/>
                <line x1="18" y1="12" x2="22" y2="12"/>
            </svg>
        </button>
    </div>

    <!-- Layers Panel -->
    <div id="layers-panel">
        <div class="layer-option active" id="layer-dark" onclick="switchLayer('dark')">
            <span class="layer-dot" style="background:#1e1e3a;border:1.5px solid #555"></span> Dark
        </div>
        <div class="layer-option" id="layer-street" onclick="switchLayer('street')">
            <span class="layer-dot" style="background:#c8d4e8"></span> Street
        </div>
        <div class="layer-option" id="layer-satellite" onclick="switchLayer('satellite')">
            <span class="layer-dot" style="background:#2d5a27"></span> Satellite
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ── Map initialisation ──────────────────────────────────────────────
        var map = L.map('map', {
            zoomControl: false,      // We use custom buttons
            zoomSnap: 0.1,
            zoomAnimation: true,
            fadeAnimation: true,
            markerZoomAnimation: true,
            inertia: true,
            inertiaDeceleration: 2500,
            worldCopyJump: true
        }).setView([-23.5505, -46.6333], 13);

        // ── Tile layers ─────────────────────────────────────────────────────
        var tileLayers = {
            dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap contributors, © CARTO'
            }),
            street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap contributors'
            }),
            satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 18,
                attribution: '© Esri'
            })
        };

        var activeLayerKey = 'dark';
        tileLayers.dark.addTo(map);

        // Hide loading overlay once base tile layer loads
        tileLayers.dark.once('load', function() {
            var el = document.getElementById('loading');
            if (el) el.classList.add('hidden');
        });

        // ── Track state ─────────────────────────────────────────────────────
        var currentLayer = null;
        var mapReady = false;
        var pendingGeoJson = null;

        // Signal Android when JS engine is ready
        map.whenReady(function() {
            mapReady = true;
            if (pendingGeoJson) {
                _drawTrackInternal(pendingGeoJson);
                pendingGeoJson = null;
            }
            if (window.Android) window.Android.onMapReady();
        });

        // ── Public API called from Android ──────────────────────────────────
        function drawTrack(geoJsonString) {
            if (!mapReady) {
                // Queue it — will be executed once map.whenReady fires
                pendingGeoJson = geoJsonString;
                return;
            }
            _drawTrackInternal(geoJsonString);
        }

        function invalidateAndFocus() {
            map.invalidateSize({ animate: false });
            if (currentLayer) {
                try {
                    map.fitBounds(currentLayer.getBounds(), { padding: [24, 24], animate: true });
                } catch(e) {}
            }
        }

        function _drawTrackInternal(geoJsonString) {
            try {
                var geoJsonData = JSON.parse(geoJsonString);

                if (currentLayer) {
                    map.removeLayer(currentLayer);
                }

                currentLayer = L.geoJSON(geoJsonData, {
                    style: function () {
                        return {
                            color: '#10b981',   // emerald
                            weight: 4,
                            opacity: 0.92,
                            lineJoin: 'round',
                            lineCap: 'round'
                        };
                    }
                }).addTo(map);

                // Force recalculate size then fit
                map.invalidateSize({ animate: false });
                map.fitBounds(currentLayer.getBounds(), { padding: [24, 24], animate: true });

                if (window.Android) window.Android.onMapReady();

            } catch(e) {
                console.error('Error parsing GeoJSON:', e);
                if (window.Android) window.Android.onError(e.toString());
            }
        }

        // ── Layer switcher ──────────────────────────────────────────────────
        function switchLayer(key) {
            if (key === activeLayerKey) { toggleLayers(); return; }
            map.removeLayer(tileLayers[activeLayerKey]);
            tileLayers[key].addTo(map);
            activeLayerKey = key;
            // Update UI
            document.querySelectorAll('.layer-option').forEach(function(el) {
                el.classList.remove('active');
            });
            document.getElementById('layer-' + key).classList.add('active');
            toggleLayers();
        }

        function toggleLayers() {
            var panel = document.getElementById('layers-panel');
            panel.classList.toggle('open');
        }

        // ── Focus / GPS button ──────────────────────────────────────────────
        function focusRoute() {
            map.invalidateSize({ animate: false });
            if (currentLayer) {
                try {
                    map.fitBounds(currentLayer.getBounds(), { padding: [24, 24], animate: true });
                } catch(e) {}
            }
        }

        // Close layers panel when clicking on map
        map.on('click', function() {
            document.getElementById('layers-panel').classList.remove('open');
        });
    </script>
</body>
</html>
