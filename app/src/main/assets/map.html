<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>PedalLog Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #131313; }
        #map { height: 100vh; width: 100vw; background: #131313; }

        /* Floating route effect */
        .leaflet-pane .leaflet-overlay-pane canvas {
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.8));
        }

        .leaflet-control-zoom { display: none !important; }

        .map-controls {
            position: absolute;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #zoom-group { right: 12px; top: 50%; transform: translateY(-50%); gap: 0; }
        #layers-group { right: 12px; bottom: 180px; }
        #focus-group { right: 12px; bottom: 120px; }

        .ctrl-btn {
            width: 44px; height: 44px;
            background: #201F1F;
            border: 1px solid #353534;
            color: #E5E2E1;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s ease;
            user-select: none;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 4px 4px 12px rgba(0,0,0,0.3);
        }

        .ctrl-btn svg { width: 22px; height: 22px; fill: currentColor; }

        .ctrl-btn:active { transform: scale(0.92); }
        #btn-zoom-in { border-radius: 12px 12px 0 0; }
        #btn-zoom-out { border-radius: 0 0 12px 12px; border-top: 0.5px solid #353534; }
        #btn-layers, #btn-speed { border-radius: 12px; }
        
        /* Emerald Focus Button */
        #btn-focus { 
            border-radius: 12px; 
            background: #54E98A; 
            border-color: #54E98A;
            color: #131313;
        }

        #layers-panel {
            position: absolute; right: 68px; bottom: 180px; z-index: 1001;
            background: #201F1F; border: 1px solid #353534; border-radius: 16px;
            padding: 8px; display: none; flex-direction: column; gap: 4px;
            min-width: 140px; box-shadow: 0 12px 40px rgba(0,0,0,0.6);
        }
        #layers-panel.open { display: flex; }

        .layer-option {
            display: flex; align-items: center; gap: 10px; padding: 10px;
            border-radius: 10px; color: #BBCBBB; font-size: 13px;
        }
        .layer-option.active { color: #54E98A; background: rgba(84, 233, 138, 0.08); }

        /* Toast Message */
        #toast {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(32, 31, 31, 0.9);
            color: #54E98A;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            z-index: 9999;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(84, 233, 138, 0.2);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        #toast.visible { opacity: 1; }

        #loading {
            position: absolute; inset: 0; background: #131313;
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        #loading.hidden { display: none; }
        .spinner {
            width: 32px; height: 32px; border: 3px solid rgba(84, 233, 138, 0.1);
            border-top-color: #54E98A; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .speed-popup .leaflet-popup-content-wrapper {
            background: #201F1F; color: #54E98A; border: 1px solid rgba(84, 233, 138, 0.3);
            border-radius: 8px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="loading"><div class="spinner"></div></div>
    <div id="toast"></div>
    <div id="map"></div>

    <!-- Grouped Controls -->
    <div class="map-controls" id="zoom-group">
        <button class="ctrl-btn" id="btn-zoom-in" onclick="map.zoomIn()">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
        <button class="ctrl-btn" id="btn-zoom-out" onclick="map.zoomOut()">
            <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
        </button>
    </div>

    <div class="map-controls" id="layers-group">
        <button class="ctrl-btn" id="btn-speed" onclick="toggleSpeedMode()">
            <svg viewBox="0 0 24 24"><path d="M16,6l2.29,2.29 -4.88,4.88 -4,-4L2,16.59 3.41,18l6,-6 4,4 6.3,-6.29L22,12V6z"/></svg>
        </button>
        <button class="ctrl-btn" id="btn-layers" onclick="toggleLayers()">
            <svg viewBox="0 0 24 24"><path d="M11.99 18.54l-7.37-5.73L3 14.07l9 7 9-7-1.63-1.27-7.38 5.74zM12 16l7.36-5.73L21 9l-9-7-9 7 1.63 1.27L12 16z"/></svg>
        </button>
    </div>

    <div class="map-controls" id="focus-group">
        <button class="ctrl-btn" id="btn-focus" onclick="focusRoute()">
            <svg viewBox="0 0 24 24"><path d="M12,8c-2.21,0 -4,1.79 -4,4s1.79,4 4,4s4,-1.79 4,-4s-1.79,-4 -4,-4zM20.94,11c-0.46,-4.17 -3.77,-7.48 -7.94,-7.94V1h-2v2.06C6.83,3.52 3.52,6.83 3.06,11H1v2h2.06c0.46,4.17 3.77,7.48 7.94,7.94V23h2v-2.06c4.17,-0.46 7.48,-3.77 7.94,-7.94H23v-2h-2.06zM12,19c-3.87,0 -7,-3.13 -7,-7s3.13,-7 7,-7s7,3.13 7,7s-3.13,7 -7,7z"/></svg>
        </button>
    </div>

    <div id="layers-panel">
        <div class="layer-option active" id="layer-dark" onclick="switchLayer('dark')">Pro-Dark</div>
        <div class="layer-option" id="layer-street" onclick="switchLayer('street')">Terrain</div>
        <div class="layer-option" id="layer-satellite" onclick="switchLayer('satellite')">Satellite</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map', { 
            zoomControl: false, 
            renderer: L.canvas({ padding: 0.5 }) 
        }).setView([-23.5505, -46.6333], 13);

        var tileLayers = {
            dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'),
            street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'),
            satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
        };

        tileLayers.dark.addTo(map).once('load', () => document.getElementById('loading').classList.add('hidden'));

        var trackLayer = L.layerGroup().addTo(map);
        var trackPoints = [];
        var replayMarker = null;
        var speedModeActive = false;

        function _getSpeedColor(speed) {
            if (speed < 5) return '#3498db';   // Slow - Blue
            if (speed < 15) return '#2ecc71';  // Normal - Green
            if (speed < 25) return '#f1c40f';  // Fast - Yellow
            if (speed < 35) return '#e67e22';  // Very Fast - Orange
            return '#e74c3c';                  // Peak - Red
        }

        function drawPoints(pointsJson) {
            try {
                trackPoints = JSON.parse(pointsJson);
                trackLayer.clearLayers();
                
                if (trackPoints.length < 2) return;

                if (speedModeActive) {
                    // Draw segments with gradient based on speed
                    for (var i = 0; i < trackPoints.length - 1; i++) {
                        var p1 = trackPoints[i];
                        var p2 = trackPoints[i+1];
                        
                        L.polyline([[p1.lat, p1.lng], [p2.lat, p2.lng]], {
                            color: _getSpeedColor(p1.spd),
                            weight: 6,
                            opacity: 0.9,
                            lineCap: 'round'
                        }).addTo(trackLayer);
                    }
                } else {
                    // Draw solid Emerald polyline
                    L.polyline(trackPoints.map(p => [p.lat, p.lng]), {
                        color: '#54E98A',
                        weight: 6,
                        opacity: 0.9,
                        lineCap: 'round'
                    }).addTo(trackLayer);
                }

                var bounds = L.latLngBounds(trackPoints.map(p => [p.lat, p.lng]));
                map.fitBounds(bounds, { padding: [40, 40] });

            } catch(e) { console.error(e); }
        }

        function toggleSpeedMode() {
            speedModeActive = !speedModeActive;
            if (trackPoints.length > 0) {
                drawPoints(JSON.stringify(trackPoints));
            }
            
            showToast(speedModeActive ? 'Modo de Velocidade Ativado' : 'Modo Sólido Ativado');
            document.getElementById('btn-speed').classList.toggle('active', speedModeActive);
            
            // Adjust speed button color if active
            document.getElementById('btn-speed').style.color = speedModeActive ? '#54E98A' : '#E5E2E1';
        }

        function showToast(msg) {
            var t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('visible');
            setTimeout(() => t.classList.remove('visible'), 2000);
        }

        // Mock function for compatibility with drawTrack calls
        function drawTrack(geo) {}

        function moveMarker(lat, lng, speed) {
            var ll = L.latLng(lat, lng);
            if (!replayMarker) {
                replayMarker = L.circleMarker(ll, { 
                    radius: 7, color: '#fff', weight: 3, fillOpacity: 1, fillColor: '#54E98A' 
                }).addTo(map);
            } else { replayMarker.setLatLng(ll); }
        }

        function switchLayer(key) {
            Object.values(tileLayers).forEach(l => map.removeLayer(l));
            tileLayers[key].addTo(map);
            document.querySelectorAll('.layer-option').forEach(el => el.classList.toggle('active', el.id === 'layer-' + key));
            toggleLayers();
        }

        function toggleLayers() { document.getElementById('layers-panel').classList.toggle('open'); }
        function focusRoute() { if (trackPoints.length > 0) map.fitBounds(L.latLngBounds(trackPoints.map(p => [p.lat, p.lng])), { padding: [40, 40] }); }
        function invalidateAndFocus() { map.invalidateSize(); focusRoute(); }
    </script>

</body>
</html>
